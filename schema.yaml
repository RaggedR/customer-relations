entities:
  patient:
    fields:
      name: { type: string, required: true }
      date_of_birth: { type: date }
      medicare_number: { type: string }
      phone: { type: phone }
      email: { type: email }
      address: { type: text }
      status: { type: enum, values: [active, inactive, discharged] }
      maintenance_plan_expiry: { type: date }
      notes: { type: text }

  referral:
    fields:
      referring_gp: { type: string, required: true }
      gp_practice: { type: string }
      referral_date: { type: date, required: true }
      reason: { type: text }
      expiry_date: { type: date }
      notes: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }

  clinical_note:
    fields:
      date: { type: datetime, required: true }
      note_type: { type: enum, values: [initial_assessment, progress_note, discharge_summary, treatment_plan] }
      content: { type: text, required: true }
      clinician: { type: string }
    relations:
      patient: { type: belongs_to, entity: patient }

  personal_note:
    fields:
      date: { type: datetime, required: true }
      content: { type: text, required: true }
    relations:
      patient: { type: belongs_to, entity: patient }

  hearing_aid:
    fields:
      ear: { type: enum, values: [left, right] }
      make: { type: string }
      model: { type: string }
      serial_number: { type: string }
      battery_type: { type: string }
      wax_filter: { type: string }
      dome: { type: string }
      programming_cable: { type: string }
      programming_software: { type: string }
      hsp_code: { type: string }
      warranty_end_date: { type: date }
      last_repair_details: { type: text }
      repair_address: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }

  claim_item:
    fields:
      item_number: { type: string, required: true }
      description: { type: string }
      date_of_service: { type: date, required: true }
      amount: { type: number }
      status: { type: enum, values: [pending, claimed, paid, rejected] }
      notes: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }

  nurse:
    fields:
      name: { type: string, required: true }
      phone: { type: phone }
      email: { type: email }
      registration_number: { type: string }
      notes: { type: text }

  nurse_specialty:
    fields:
      specialty: { type: string, required: true }
      notes: { type: text }
    relations:
      nurse: { type: belongs_to, entity: nurse }

  attachment:
    fields:
      filename: { type: string, required: true }
      storage_path: { type: string, required: true }
      mime_type: { type: string }
      size_bytes: { type: number }
      category: { type: enum, values: [referral_letter, test_result, clinical_document, other] }
      description: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }
      clinical_note: { type: belongs_to, entity: clinical_note }
