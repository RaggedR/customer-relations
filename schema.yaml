entities:
  patient:
    exportable: true
    display:
      title: name
      subtitle: [phone, email]
      badge: status
    upsert_keys: [name, date_of_birth]
    fields:
      name: { type: string, required: true }
      date_of_birth: { type: date }
      medicare_number: { type: string, ai_visible: false }
      phone: { type: phone, ai_visible: false }
      email: { type: email, ai_visible: false }
      address: { type: text, ai_visible: false }
      status: { type: enum, values: [active, inactive, discharged] }
      maintenance_plan_expiry: { type: date }
      notes: { type: text }
    representations:
      vcard:
        mapping:
          name: FN
          phone: TEL
          email: EMAIL
          address: ADR
          date_of_birth: BDAY
      csv:
        headers:
          name: "Patient Name"
          phone: "Contact Number"
          email: "Email"
          date_of_birth: "Date of Birth"
          medicare_number: "Medicare Number"
          address: "Address"
          status: "Status"
      json:
        include_relations: [referral, clinical_note, personal_note, hearing_aid, claim_item, attachment]

  referral:
    display:
      title: referring_gp
      subtitle: [referral_date, gp_practice]
    upsert_keys: [referring_gp, referral_date]
    fields:
      referring_gp: { type: string, required: true }
      gp_practice: { type: string }
      referral_date: { type: date, required: true }
      reason: { type: text }
      expiry_date: { type: date }
      notes: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }

  clinical_note:
    label: "Clinical Notes"
    label_singular: "Clinical Note"
    immutable: true
    display:
      title: date
      badge: note_type
      summary: content
      summary_max: 100
    upsert_keys: [date, content]
    fields:
      date: { type: datetime, required: true }
      note_type: { type: enum, values: [initial_assessment, progress_note, discharge_summary, treatment_plan] }
      content: { type: text, required: true }
      clinician: { type: string }
    relations:
      patient: { type: belongs_to, entity: patient }

  personal_note:
    label: "Personal Notes"
    label_singular: "Personal Note"
    immutable: true
    display:
      title: date
      summary: content
      summary_max: 120
    fields:
      date: { type: datetime, required: true }
      content: { type: text, required: true }
    relations:
      patient: { type: belongs_to, entity: patient }

  hearing_aid:
    label: "Hearing Aids"
    label_singular: "Hearing Aid"
    display:
      title: "{ear} — {make} {model}"
      subtitle: serial_number
    upsert_keys: [serial_number, patient_name]
    fields:
      ear: { type: enum, values: [left, right] }
      make: { type: string }
      model: { type: string }
      serial_number: { type: string }
      battery_type: { type: string }
      wax_filter: { type: string }
      dome: { type: string }
      programming_cable: { type: string }
      programming_software: { type: string }
      hsp_code: { type: string }
      warranty_end_date: { type: date }
      last_repair_details: { type: text }
      repair_address: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }
    representations:
      csv:
        headers:
          ear: "Ear"
          make: "Make"
          model: "Model"
          serial_number: "Serial Number"
          battery_type: "Battery Type"
          wax_filter: "Wax Filter"
          dome: "Dome"
          programming_cable: "Programming Cable"
          programming_software: "Programming Software"
          hsp_code: "HSP Code"
          warranty_end_date: "Warranty End Date"
          last_repair_details: "Last Repair Details"
          repair_address: "Repair Address"
      json:
        groups:
          device: [make, model, serial_number]
          consumables: [battery_type, wax_filter, dome]
          programming: [programming_cable, programming_software]
          admin: [hsp_code, warranty_end_date, last_repair_details, repair_address]

  claim_item:
    label: "Claim Items"
    label_singular: "Claim Item"
    display:
      title: item_number
      subtitle: [date_of_service, description]
      badge: status
    upsert_keys: [item_number, date_of_service]
    fields:
      item_number: { type: string, required: true }
      description: { type: string }
      date_of_service: { type: date, required: true }
      amount: { type: number }
      status: { type: enum, values: [pending, claimed, paid, rejected] }
      notes: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }

  appointment:
    sidebar_addable: true
    display:
      title: "{specialty}"
      subtitle: [date, start_time]
      badge: status
    upsert_keys: [date, start_time, patient_name]
    fields:
      date: { type: date, required: true }
      start_time: { type: time, required: true }
      end_time: { type: time, required: true }
      location: { type: string, required: true }
      specialty: { type: string, required: true }
      status: { type: enum, values: [requested, confirmed, completed, cancelled, no_show] }
      notes: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }
      nurse: { type: belongs_to, entity: nurse }
    representations:
      ical:
        mapping:
          date: DTSTART_DATE
          start_time: DTSTART_TIME
          end_time: DTEND_TIME
          location: LOCATION
          notes: DESCRIPTION
        # APP 8 (cross-border disclosure): patient name removed from iCal summary
        # so that patient PII is not sent to Google Calendar / Apple Calendar servers.
        summary_template: "{specialty} — Appt #{id}"
      csv:
        headers:
          date: "Date"
          start_time: "Start Time"
          end_time: "End Time"
          location: "Location"
          specialty: "Specialty"
          status: "Status"
          notes: "Notes"

  nurse:
    upsert_keys: [name]
    fields:
      name: { type: string, required: true }
      phone: { type: phone, ai_visible: false }
      email: { type: email, ai_visible: false }
      registration_number: { type: string, ai_visible: false }
      caldav_url: { type: string }
      google_calendar_id: { type: string }
      notes: { type: text }
    representations:
      vcard:
        mapping:
          name: FN
          phone: TEL
          email: EMAIL
      csv:
        headers:
          name: "Nurse Name"
          phone: "Phone"
          email: "Email"
          registration_number: "Registration Number"

  nurse_specialty:
    label: "Specialties"
    label_singular: "Specialty"
    display:
      title: specialty
      subtitle: notes
    fields:
      specialty: { type: string, required: true }
      notes: { type: text }
    relations:
      nurse: { type: belongs_to, entity: nurse }

  calendar_connection:
    label: "Calendar Connections"
    label_singular: "Calendar Connection"
    fields:
      provider: { type: enum, values: [google, apple, caldav_generic] }
      calendar_id: { type: string }
      access_token: { type: string }
      refresh_token: { type: string }
      token_expiry: { type: datetime }
    relations:
      nurse: { type: belongs_to, entity: nurse }

  attachment:
    display:
      title: filename
      subtitle: category
      actions:
        - label: Download
          href: "/api/attachments/{id}/download"
    fields:
      filename: { type: string, required: true }
      storage_path: { type: string, required: true }
      mime_type: { type: string }
      size_bytes: { type: number }
      category: { type: enum, values: [referral_letter, test_result, clinical_document, other] }
      description: { type: text }
    relations:
      patient: { type: belongs_to, entity: patient }
      clinical_note: { type: belongs_to, entity: clinical_note }

  # --- Auth & compliance entities (infrastructure, not shown in sidebar) ---

  user:
    fields:
      email: { type: email, required: true }
      name: { type: string, required: true }
      password_hash: { type: string, required: true }
      role: { type: enum, values: [admin, nurse, patient], required: true }
      active: { type: boolean }

  session:
    fields:
      token: { type: string, required: true }
      last_active: { type: datetime, required: true }
      expires_at: { type: datetime, required: true }
      ip: { type: string }
      user_agent: { type: string }
    relations:
      user: { type: belongs_to, entity: user }

  audit_log:
    label: "Audit Logs"
    label_singular: "Audit Log"
    fields:
      timestamp: { type: datetime, required: true }
      action: { type: string, required: true }
      entity: { type: string, required: true }
      entity_id: { type: string, required: true }
      details: { type: text }
      ip: { type: string }
      user_agent: { type: string }
    relations:
      user: { type: belongs_to, entity: user }
