version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_dev_password}
      POSTGRES_DB: customer_relations
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://crm:${POSTGRES_PASSWORD:-crm_dev_password}@db:5432/customer_relations
      SESSION_SECRET: ${SESSION_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      CARDDAV_PASSWORD: ${CARDDAV_PASSWORD}
      BACKUP_PASSPHRASE: ${BACKUP_PASSPHRASE}
      DATABASE_URL_READONLY: ${DATABASE_URL_READONLY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./schema.yaml:/app/schema.yaml
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
