version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_dev_password
      POSTGRES_DB: customer_relations
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://crm:crm_dev_password@db:5432/customer_relations
    depends_on:
      - db
    volumes:
      - ./schema.yaml:/app/schema.yaml
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
